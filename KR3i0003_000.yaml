body:
  text: 提要硯史一卷譜録類一器物之屬臣等謹案硯史宋米芾撰首冠以用品一條論石之當以發墨為上後附性品一條論石質之堅軟樣品一條則備列晉硯唐硯以迄宋代形製之不同中紀諸硯自玉硯至蔡州白硯凡二十六種而於端歙二石辨之尤詳自謂皆曾目擊經用者非此則不録其用意殊為矜慎末紀所收青翠疊石一正紫石一皆指為厯代之瓌寶而獨不及所謂南唐硯山者或當時尚未歸寶晉齊中或已為薛紹彭所易均未可知也芾本工書法凡石之良楛皆出親試故所論具得硯理視他家之耳食者不同其論厯代制作之變考据尤極精確有足為文房鑒古之助者焉歙州硯譜一卷譜録類一器物之屬臣等謹案歙州硯譜原本不著撰人名氏惟卷末題有大宋治平丙午歲重九日十字考之陳振孫書録解題載有歙硯圗譜一卷稱太子中舍知婺源縣唐積撰治平丙午歲云云其年月與此相合然則此即積書矣中分採發石坑攻取品目修斫名狀石病道路匠手攻器十門所志開鑿成造之法甚為詳晰蓋歙石顯於南唐宋人以其發墨頗好用之土人藉是為生往往多作形製以希售米芾嘗譏其好為端樣以平直斗樣為貴滯墨甚可惜而此書名狀門內實首列端樣亦可以考見一時風尚也書録解題作圖譜米芾亦稱今之製見歙州硯圖而此本有譜無圖蓋左圭刋入百川學海時已有所刪削今亦姑仍之云歙硯說一卷辨歙石說一卷譜録類一器物之屬臣等謹案歙硯說辨歙石說原本不著撰人名氏陳振孫書録解題載之亦云皆不著姓名左圭百川學海刻之唐積譜後卷末有跋稱紹興三十年十二月弟左承議郎尚書禮部員外郎兼國史院編修官邁跋跋中稱景伯兄治歙既揭蘇氏文房譜於四寶堂又别刻硯說三種云云按景伯為洪邁兄洪適之字則此二書似出於適然與邁跋三種之說不合考適盤洲集有蘇易簡文房四譜跋稱說歙硯者凡三家品諸李者有墨苑以踵此編然則此二種蓋與唐積之譜共為三種皆適所刻以附於文房譜之後者實非適所自撰也硯說兼紀採石之地琢石之法及其品質之髙下歙石說則專論其紋理星暈凡二十七種辨别頗為詳細如唐詢北海公硯録見於郡齊讀書志者今其本久已失傳惟此書引有兩條及無名氏硯譜引有一條猶可以考見什一云端溪硯譜一卷譜録類一器物之屬臣等謹案端溪硯譜原本不著撰人名氏卷未有淳熙十年東平榮芑跋曰右縉雲葉樾交叔傳此譜稍異於衆人之說不知何人所撰稱徽祖為太上皇必紹興初人云云是當時已不詳其出自誰手矣其書前論石之所出與石質石眼次論價次論形製而終以石病唐柳公權論硯首青絳二州不言端石蘇易簡文房四譜亦尚以青州紅絲硯為首自是以後端硯始獨重於世而鑒别之法遂愈以精密此譜所載於地産之優劣石品之髙下皆剖晰微至可以依據至如當時以子石為貴而此獨辨其妄故榮芑以為稍異於衆人之說蓋指此類而言自米芾硯史已云遍詢石工未嘗有子石芾為含光縣尉嘗親至端州得其詳而其言正與此合亦足以知其說之真確也硯譜一卷譜録類一器物之屬臣等謹案硯譜原本不著撰人姓名朝陳二家亦俱未著録惟左圭刻入百川學海中皆雜録硯之出産與其故實中間載有歐陽修蘇軾唐詢鄭樵諸人之說蓋南宋初人也其書僅三十二條不為贍博採托間有踈舛如以端溪子石為在大石中生尚沿舊說未加考正又如許漢陽以碧玉為硯其事出谷神子博異記乃龍女之硯非漢陽硯亦為徵引之誤以其流傳既久尚有一二條足資多識者故附著於諸家硯譜之次以備檢校焉乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
