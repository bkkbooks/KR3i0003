  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3i0003_WYG_001-1a, image: WYG0843/WYG0843-0066c.png}
body:
  text: 硯史宋米芾撰人好萬殊而以甚同為公甚不同為惑喻之而移非真得之更而得之則必信其守夫博奕猶賢乎已則吾是文必不見嗤于賞鑒之士用品器以用為功玉不為鼎陶不為柱文錦之美方暑則不先於表出之綌楮葉雖工而無補於宋人之用夫如是則石理發墨為上色次之形製工拙又其次文藻縁飾雖天然失硯之用玉硯玉出光為硯着墨不滲甚發墨有光其云磨墨處不出光者非也余自製成蒼玉硯唐州方城縣葛仙公巖石石理向日視之如玉瑩如鑑光而着墨如澄泥不滑稍磨之墨已下而不熱生泡生泡者膠也古墨無泡膠力盡也若石滑磨久墨下遲則兩剛生熱故膠生泡也此石既不熱良久墨發生光如漆如油有艶不滲也歳久不乏常如新成有君子一德之操色紫可愛聲平而有韻亦有澹青白色如月如星而無暈此石近出始見十餘枚矣温州華嚴尼寺巖石石理向日視之如方城石磨墨不熱無泡發墨生光如漆如油有艶不滲色赤而多有白沙㸃為硯則避磨墨處比方城差慢難嶄而易磨亦有白㸃㸃處有玉性扣之聲平無韻校理石揚休所購王羲之硯者乃此石今人所收古硯間有此石形合晉畫約見四五枚矣端州巖石巖有四下巖上巖半邊巖後礫巖余嘗至端故得其説詳下巖第一穿洞深入不論四時皆為水浸治平中貢硯取水月餘方及石石細扣之清越鸜鵒眼圓碧暈多明瑩石嫰甚者如泥無聲不着墨清越者温潤著墨快不熱無泡然良久微滲若油發艶亦有不乏者然方城温巖十磨此石三十磨方相及下巖既深工人所費多硯直不補故力無能取近年無復有聞有仁廟已前賜史院官硯多是其後來歳貢惟上巖石上巖在山上石性乾紫色深理麄性硬眼黄差不圓而青色淡其巖深處間有潤者而眼終不如下巖也有着墨者拒墨者其着墨者初用半月前甚快葢細砂石所發出理也半月後則退生光撻墨又須以柔石發之已而復然拒墨者雖新成便拒墨此等石扣之聲皆堅響而老半邊巖者在山半石理同上巖色多青紫近墨多瑕而眼長如卵有瞎眼者中是白㸃死眼者黒㸃而暈細翳眼者或青或黒横亂其眼又多青不成眼圓㸃横長青間道如松木紋其極麤者費筆而稍細者多乏後礫石上人刻為盆印合壓紙兒戲之物多夾砂無眼少瑕間有極細軟者發墨不乏扣之無聲土人不貴而用實有在半邊上巖之上者不可常得又徧詢石工云子石未嘗有其在巖中實於大石版上鑿豈有中包一子者余嘗謂若溪流中多有卵石容差褊可嶄面磨墨所謂石子世因訛為子石至有斵樣相似而為之者於理必不於大石中心復生卵子也世之好竒者又以歙州羅紋石作子石硯文本直兩頭取銳則紋脫短至左右頰自然成漩紋便謂之是真子石可笑緑石帶黄色亦為硯多以為器材甚美而得墨快少光彩已上硯平生約見五七百枚十千已上無估歙硯婺源石歙州有硯圗石峒最多種而赤紫石多瑕土人以線脉隔為三種病今人以細羅紋無星為上少時見一硯於士人趙光㢸家其樣上狹四寸許下濶六寸許如二十幅紙厚色緑如公裳而㸃如紫金斑斑匀布無羅紋㸃中無竅自後不復覩如此等者又士人周昌諤處見一小圓硯青羅紋一星紫金如鵞眼錢此二硯最竒大抵發墨不乏獨以色如常之石而以奇怪為品髙亦有赤紫色石無文理少瑕光澤如棗木土人以為香爐之類亦斵為硯與墨鬭而不相入經日便滑不可研矣又嘗一士人家見一金絲羅紋硯其紋半金半黒光彩與常異此外麤羅紋刷絲羅紋為次第約見千餘枚矣但以色與瓦磚等品故不能髙今但曾官歙者必收百餘枚土人以為生終日成一硯少有病不直數十金幸完仍好直五七千已上無估通逺軍漞石硯石理澁可礪刃緑色如朝衣深者亦可愛又則水波紋間有黒小㸃土人謂之湔墨㸃有𦂳甚竒妙而硬者與墨鬭而慢甚者滲墨無光其中者甚佳在洮河緑石上自朝廷開熙河始為中國有亦有赤紫石色斑為硯發墨過於緑者而不匀凈又有黒者戎人以礪刀而鐵色光肥亦可作硯而堅不發墨西都會聖宫硯會聖宫石在溪澗中色紫理如虢石差硬發墨不乏扣之無聲青州青石色類歙理皆不及發墨不乏有瓦礫之象成州栗亭石色青有銅㸃大如指理慢發墨不乏亦有瓦礫之象潭州谷山硯色淡青有紋如亂絲理慢扣之無聲得墨快發墨有光成州栗玉硯理堅色如栗不甚著墨為器甚佳歸州緑石硯理有風濤之象紋頭𦂳慢不等治難平得墨快滲墨無光彩色緑可愛如賁色澹如水蒼玉夔州黟石硯色黒理乾間有墨㸃如墨玉光發墨不乏廬州青石硯大略與潭州谷山同蘇州褐黄石硯理麤發墨不滲類䕫石土人刻成硯以草一束燒過為慢灰火煨之色遂變紫用之與不煨者一同亦不燥乃知天性非水火所移建溪黯澹石理如牛角扣之聲堅清磨久不得墨縱得色變如灰作器甚佳陶硯相州土人自製陶硯在銅雀上以熟絹二重淘泥澄之取極細者燔為硯有色緑如春波者或以黒白填為水紋其理細滑着墨不費筆但微滲吕硯澤州有吕道人陶硯以别色泥於其首純作吕字内外透後人效之有縫不透也其理堅重與凡石等以厯青火油之堅響滲入三分許磨墨不乏其理與方城石等淄州硯淄石理滑易乏在建石之次髙麗硯理密堅有聲發墨色青間白有金星隨横文密成列用乆乏青州藴玉石紅絲石青石理密聲堅清色青黒白㸃如彈不着墨墨無光好事者但置為一器可紅絲石作器罙佳大抵色白而紋紅者慢發墨亦漬墨不可洗必磨治之紋理斑石赤者不漬墨發墨有光而紋大不入看慢者經暍則色損凍則裂乾則不可磨墨浸經日方可用一用又可滌非品之善青石有麤文如羅近歙亦着墨不發虢州石理細如泥色紫可愛發墨不滲久之石漸損回硬墨磨之則有泥香信州水晶硯於他硯磨墨汁傾入用蔡州白硯理滑可為器為朱硯花蘂石亦作小朱硯性品大抵四方硯發墨久不乏者石必差軟扣之聲低而有韻歳久漸凹不發墨者石堅扣之堅響稍用則如鏡走墨余所品謂目擊自收經用者聞雖多不録以傳疑古硯無不佳豈不嘗落非好事者手用之則尋棄擲之矣惟久在人間賢庸並善是以不乏傳也樣品晉硯見於晉顧愷之畫者有於天生疊石上刋人面者有十蹄圓銅硯中如𨫼者余嘗以紫石作之有上圓下方於圓純上刋兩竅置筆者有如鳯字兩足者獨此甚多所謂鳯凰池也葢以上並晉製見于晉人圖畫世俗呼為風字葢不原兩足之製謂之鳯足至今端州石工以兩眼相對於足傍者謂之鳯足鳯之義取五色英文燦然成章也今人有收得右軍硯其製與晉圗畫同頭狹四寸許下濶六寸許頂兩純皆綽慢下不勒成痕外如内之製足狹長色紫類温巖中凹成臼又有收得智永硯頭微圓又類箕象中亦成臼矣又有人收古銅硯一龜銜一硯如蓮葉兩足龜腹圓墨水不可出以筆頭就之則出又參政蘇文簡家收唐畫唐太宗長孫后納諌圖宫人於瑪瑙盤中托一圓頭鳯池硯似晉製頭純直微凸如書鳯字左右純斜刋下不勒痕摺向頂亦然不滯墨其外隨内勢簡易其後至隋唐工稍巧頭圓身微瘦下濶而足或圓為柱已不逮古至本朝變成穹髙腰瘦刃濶如鉞斧之狀仁廟已前硯多作此製後差少資政殿學士蒲傳正收真宗所用硯與仁廟賜駙馬都尉李公炤鳯池硯形製一同至今尚方多此製國初已來公卿家往往有之仁宗已前賜史院官硯皆端溪石純薄上狹下濶峻直不出足中坦夷猶有鳯池之像或有四邊刋花中為魚為龜者凡此形製多端下巖竒品也嘉祐末硯樣已如大指麤心甚凸意求渾厚而氣象葢不古純斗故勒深滯墨難滌心凸故㸃筆不圓常如三角簇葢古硯皆心凹後稍正平未有凸者始自侍讀學士唐彦猷作紅絲辟雍硯心髙凸至作馬蹄樣亦心凸至磨墨溜向身出觀墨色則凸髙增浮泛之勢援毫則非便也其晉銅硯雖如𨫼然頂殊平以便援毫今杭州龍華寺收梁傳大夫甆硯一枚甚大磁褐色心如𨫼環水如辟雍之製下作浪花擢環近足處而磨墨處無磁油然殊著墨古墨稱螺亦恐不若近世堅不然殆不可磨也又丹陽人多於古塜得銅硯三足蹄有葢不鏤花中陷一片陶今人往往作硯於其中翻以為匣也唐墓中間有得如蓮葉中凹兩足如鳯池之製甚薄足或如棗也今歙人最多作形製而土人尤重端樣以平直斗樣為貴得美石無瑕必先作此樣滯墨甚可惜也大抵石美無瑕方可施工璞而厚者土人多識其藏疾不復巧製人或因其渾厚而美之余嘗惡歙樣俗者凡刋改十餘硯纔半指許便有病見頓令人减愛其端人不斵成祗持璞賣者亦多如是陳文惠丞相家收一蜀王衍時皇太子陶硯連葢葢上有鳯坐一臺餘雕雜花草湼之以金泥紅漆有字曰鳯凰臺此製方直上狹笋在硯上中甚平也唐之製見文房四譜今之製見歙州硯圖故不重出此人力所為也吾收一青翠疊石堅響三層傍一嵌磨墨上出一峰髙尺餘頂復平嵌巖如亂雲四垂以覆硯以水澤頂則隨葉垂珠滴硯心上有銘識事見唐莊南傑賦乃厯代所寳也又收一正紫石四疊下有坐有足巧於癭盂足上起一枝細狹枝上盤兩疊長七寸餘濶四寸餘如靈芝首銳下濶天然鳯池之象中微凹㸃水磨墨可書十幅紙石理在方城之右此非人力所成信天下之瓌寳也硯史
